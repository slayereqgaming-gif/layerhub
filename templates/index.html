<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LayerHub - Modele i Blueprinty 3D</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0a0f0d; color: #e2e8f0; margin: 0; padding: 0; text-align: center; }
        header { background-color: #111c17; color: #10b981; padding: 45px 20px; border-bottom: 2px solid #047857; }
        header h1 { margin: 0; font-size: 2.8em; letter-spacing: 2px; }
        .auth-buttons { position: absolute; top: 30px; right: 30px; display: flex; gap: 12px; }
        .btn { border: none; padding: 10px 22px; font-weight: bold; border-radius: 6px; cursor: pointer; color: white; }
        .login-btn { background-color: #1f2937; border: 1px solid #047857; color: #10b981; }
        .signup-btn { background-color: #10b981; }
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); }
        .modal-content { background-color: #111827; margin: 15% auto; padding: 35px; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid #047857; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #94a3b8; }
        .form-group { margin-bottom: 20px; }
        .form-group input { width: 100%; padding: 12px; background-color: #1f2937; border: 1px solid #4b5563; border-radius: 6px; color: white; }
        .submit-btn { width: 100%; color: white; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .submit-signup { background-color: #10b981; }
    </style>
</head>
<body>
    <header>
        <h1>LayerHub</h1>
        <div class="auth-buttons">
            {% if current_user %}
                <span class="btn">Witaj, {{ current_user }}!</span>
                <a href="/logout" class="btn login-btn">Wyloguj</a>
            {% else %}
                <button class="btn login-btn" onclick="openModal('loginModal')">Login</button>
                <button class="btn signup-btn" onclick="openModal('signUpModal')">Sign Up</button>
            {% endif %}
        </div>
    </header>
    <div class="container">
        <!-- Main Content (Omitted for brevity - same as original) -->
        <div class="earn-box">
            <h2>Zarabiaj na projektach! 💰</h2>
            {% if current_user %}
                <button class="earn-btn" onclick="openModal('addProjectModal')">Dodaj projekt</button>
            {% else %}
                <button class="earn-btn" onclick="openModal('signUpModal')">Zacznij zarabiać</button>
            {% endif %}
        </div>
    </div>
    <!-- Modals (Omitted for brevity - same as original) -->
    <script>
        function openModal(modalId) { document.getElementById(modalId).style.display = "block"; }
        function closeModal(modalId) { document.getElementById(modalId).style.display = "none"; }
        window.onclick = function(event) { if (event.target.classList.contains('modal')) event.target.style.display = "none"; }
    </script>
</body>
</html>
