<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LayerHub.pl - Modele i Blueprinty 3D</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0f0d; /* Czarne/bardzo ciemne tło */
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #111c17; /* Ciemnozielony nagłówek */
            color: #10b981; /* Jasnozielony tekst neonowy */
            padding: 45px 20px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.1);
            position: relative;
            border-bottom: 2px solid #047857;
        }
        header h1 {
            margin: 0;
            font-size: 2.8em;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }
        header p {
            margin: 10px 0 0 0;
            color: #a7f3d0;
            opacity: 0.9;
            font-size: 1.2em;
        }
        .auth-buttons {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            gap: 12px;
        }
        .btn {
            border: none;
            padding: 10px 22px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }
        .login-btn { 
            background-color: #1f2937; 
            border: 1px solid #047857;
            color: #10b981;
        }
        .login-btn:hover { background-color: #047857; color: white; }
        .signup-btn { background-color: #10b981; }
        .signup-btn:hover { background-color: #059669; box-shadow: 0 0 12px rgba(16, 185, 129, 0.4); }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .welcome-box {
            background: #111827; /* Ciemny grafit */
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 1px solid #1f2937;
            border-top: 5px solid #10b981;
        }
        .explore-btn {
            display: inline-block;
            margin-top: 25px;
            background-color: #047857;
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.2s;
            border: 1px solid #10b981;
            cursor: pointer;
        }
        .explore-btn:hover {
            background-color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
            transform: translateY(-2px);
        }
        .error-msg {
            background-color: #7f1d1d;
            color: #fca5a5;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            margin-bottom: 20px;
            border: 1px solid #b91c1c;
        }
        /* Modal Styles */
        .modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }
        .modal-content {
            background-color: #111827;
            margin: 15% auto;
            padding: 35px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 25px rgba(16, 185, 129, 0.2);
            text-align: left;
            position: relative;
            border: 1px solid #047857;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #94a3b8;
        }
        .close-btn:hover { color: #10b981; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #10b981; }
        .form-group input { width: 100%; padding: 12px; box-sizing: border-box; background-color: #1f2937; border: 1px solid #4b5563; border-radius: 6px; font-size: 1em; color: white; }
        .form-group input:focus { border-color: #10b981; outline: none; }
        .submit-btn { width: 100%; color: white; border: none; padding: 12px; font-size: 1.1em; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .submit-signup { background-color: #10b981; }
        .submit-signup:hover { background-color: #059669; }
        .submit-login { background-color: #047857; border: 1px solid #10b981; }
        .submit-login:hover { background-color: #065f46; }
    </style>
</head>
<body>

    <header>
        <h1>LayerHub.pl</h1>
        <p>Twoja baza blueprintów i projektów na drukarki 3D</p>
        <div class="auth-buttons">
            <button class="btn login-btn" onclick="openModal('loginModal')">Login</button>
            <button class="btn signup-btn" onclick="openModal('signUpModal')">Sign Up</button>
        </div>
    </header>

    <div class="container">
        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <div class="welcome-box">
            <h2 style="color: #10b981; margin-top: 0;">Witaj na LayerHub!</h2>
            <p>Zaloguj się lub zarejestruj, aby uzyskać pełny dostęp do strefy pobierania modeli 3D.</p>
            
            <!-- Nowy przycisk otwierający okno rejestracji, zachęcający do sprawdzenia plików -->
            <button class="explore-btn" onclick="openModal('signUpModal')">Explore Basic Projects</button>
        </div>
    </div>

    <!-- MODAL REJESTRACJI -->
    <div id="signUpModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('signUpModal')">&times;</span>
            <h2 style="margin-top: 0; color: #10b981;">Create Account</h2>
            <form action="/register" method="POST">
                <div class="form-group">
                    <label for="reg-nickname">Nickname:</label>
                    <input type="text" id="reg-nickname" name="nickname" required placeholder="Enter nickname">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password:</label>
                    <input type="password" id="reg-password" name="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="submit-btn submit-signup">Sign Up</button>
            </form>
        </div>
    </div>

    <!-- MODAL LOGOWANIA -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('loginModal')">&times;</span>
            <h2 style="margin-top: 0; color: #10b981;">Sign In</h2>
            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="log-nickname">Nickname:</label>
                    <input type="text" id="log-nickname" name="nickname" required placeholder="Enter your nickname">
                </div>
                <div class="form-group">
                    <label for="log-password">Password:</label>
                    <input type="password" id="log-password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="submit-btn submit-login">Login</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).style.display = "block"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = "none";
            }
        }
    </script>

</body>
</html>
