<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>LayerHub - Modele 3D</title>
    <style>
        /* [Stylizacja dla LayerHub: Ciemny motyw z zielonymi akcentami] */
        body { font-family: sans-serif; background: #0a0f0d; color: #e2e8f0; text-align: center; }
        header { background: #111c17; color: #10b981; padding: 20px; border-bottom: 2px solid #047857; }
        .btn { padding: 10px 22px; border-radius: 6px; cursor: pointer; }
        .login-btn { background: #1f2937; color: #10b981; border: 1px solid #047857; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .project-card { background: #111827; border: 1px solid #1f2937; padding: 20px; border-radius: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #111827; margin: 15% auto; padding: 20px; width: 300px; border-radius: 8px; }
    </style>
</head>
<body>
    <header>
        <h1>LayerHub</h1>
        <button class="btn login-btn" onclick="openModal('loginModal')">Login</button>
    </header>

    <div class="projects-grid">
        <div class="project-card">
            <h3>01. łódka</h3>
            <button class="btn" onclick="openModal('loginModal')">Pobierz</button>
        </div>
    </div>

    <!-- Modale (Logowanie/Rejestracja) -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal('loginModal')">&times;</span>
            <form action="/login" method="POST">
                <input type="text" name="nickname" placeholder="Nickname" required>
                <input type="password" name="password" placeholder="Hasło" required>
                <button type="submit">Zaloguj</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).style.display = "block"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
    </script>
</body>
</html>
