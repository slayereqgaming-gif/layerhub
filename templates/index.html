<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LayerHub.pl - Modele i Blueprinty 3D</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #1e293b;
            color: white;
            padding: 30px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 1px;
        }
        header p {
            margin: 10px 0 0 0;
            opacity: 0.8;
            font-size: 1.1em;
        }
        /* Kontener na przyciski w prawym górnym rogu */
        .auth-buttons {
            position: absolute;
            top: 25px;
            right: 30px;
            display: flex;
            gap: 10px;
        }
        .btn {
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            color: white;
        }
        .login-btn { background-color: #475569; }
        .login-btn:hover { background-color: #334155; }
        .signup-btn { background-color: #007acc; }
        .signup-btn:hover { background-color: #005999; }
        
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .welcome-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            border-top: 5px solid #007acc;
        }
        .error-msg {
            background-color: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            text-align: left;
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; }
        .submit-btn { width: 100%; color: white; border: none; padding: 12px; font-size: 1.1em; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .submit-signup { background-color: #10b981; }
        .submit-signup:hover { background-color: #059669; }
        .submit-login { background-color: #007acc; }
        .submit-login:hover { background-color: #005999; }
    </style>
</head>
<body>

    <header>
        <h1>LayerHub.pl</h1>
        <p>Twoja baza blueprintów i projektów na drukarki 3D</p>
        <div class="auth-buttons">
            <button class="btn login-btn" onclick="openModal('loginModal')">Login</button>
            <button class="btn signup-btn" onclick="openModal('signUpModal')">Sign Up</button>
        </div>
    </header>

    <div class="container">
        <!-- Wyświetlanie błędów, jeśli Python je odeśle -->
        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <div class="welcome-box">
            <h2>Witaj na LayerHub!</h2>
            <p>Zaloguj się lub zarejestruj, aby uzyskać dostęp do strefy Community z projektami.</p>
        </div>
    </div>

    <!-- MODAL REJESTRACJI -->
    <div id="signUpModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('signUpModal')">&times;</span>
            <h2 style="margin-top: 0; color: #1e293b;">Create Account</h2>
            <form action="/register" method="POST">
                <div class="form-group">
                    <label for="reg-nickname">Nickname:</label>
                    <input type="text" id="reg-nickname" name="nickname" required placeholder="Enter nickname">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password:</label>
                    <input type="password" id="reg-password" name="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="submit-btn submit-signup">Sign Up</button>
            </form>
        </div>
    </div>

    <!-- MODAL LOGOWANIA -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('loginModal')">&times;</span>
            <h2 style="margin-top: 0; color: #1e293b;">Sign In</h2>
            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="log-nickname">Nickname:</label>
                    <input type="text" id="log-nickname" name="nickname" required placeholder="Enter your nickname">
                </div>
                <div class="form-group">
                    <label for="log-password">Password:</label>
                    <input type="password" id="log-password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="submit-btn submit-login">Login</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).style.display = "block"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = "none";
            }
        }
    </script>

</body>
</html>
